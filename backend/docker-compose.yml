services:
  postgres:
    image: postgres:16
    container_name: authentication_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: authentication_dev
    ports:
      - "5432:5432"
    volumes:
      - authenticaiton_postgres_data:/var/lib/postgres/data

volumes:
  authenticaiton_postgres_data:
