name: CI

on:
  pull_request:
    branches:
      - develop
      - test
      - stage
      - main
  push:
    branches:
      - develop
      - test
      - stage
      - main
permissions:
  contents: read

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Check formatting
        run: npm run format:check

  contracts:
    name: Contracts check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck contracts
        run: npm run contracts:typecheck

      - name: Test Contract
        run: npm run contracts:test

      - name: Build contract
        run: npm run contracts:build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DATABASE: authentication_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      AUTH0_DOMAIN: test-domain.example.com
      AUTH0_AUDIENCE: https://api.test.example.com
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/authentication_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build contracts
        run: npm run contracts:build
        working-directory: .

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run database migrations
        run: npm run prisma:migrate:deploy

      - name: Typecheck backend
        run: npm run typecheck

      - name: Unit test backend
        run: npm run test:unit

      - name: Integration test backedn
        run: npm run test:integration

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_APP_ENV: test
      VITE_API_BASE_URL: http://localhost:3001
      VITE_AUTH0_DOMAIN: test-domain.example.com
      VITE_AUTH0_CLIENT_ID: test-client-id
      VITE_AUTH0_AUDIENCE: https://api.test.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build contracts
        run: npm run contracts:build
        working-directory: .

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Unit test frontend
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
