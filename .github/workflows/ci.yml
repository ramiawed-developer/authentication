name: CI

on:
  pull_request:
    branches:
      - develop
      - test
      - stage
      - main
  push:
    branches:
      - develop
      - test
      - stage
      - main
permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck

      - name: Unit test backend
        run: npm run test:unit

      - name: Integration test backedn
        run: npm run test:integration

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        run: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Unit test frontend
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
